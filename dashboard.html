<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Haitham Kallab</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        :root { --main:#a855f7; --bg:#04000e; --card:#0b0025; --border:#4c1d95; }
        body { background:var(--bg); color:#e9d5ff; }

        /* Login Screen */
        #login-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:9999; display:flex; justify-content:center; align-items:center; }
        .login-box { background:var(--card); border:1px solid var(--border); padding:2.5rem; border-radius:1rem; width:90%; max-width:400px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.5); }
        .login-box h2 { color:var(--main); margin-bottom:1.5rem; }
        .login-box input { margin-bottom:1.2rem; text-align:center; }
        #login-error { color:#f43f5e; margin-top:1rem; display:none; font-size:0.9rem; }

        .header { background:var(--card); border-bottom:2px solid var(--main); padding:1.5rem 3rem; display:flex; justify-content:space-between; align-items:center; }
        .header h1 { color:var(--main); font-size:1.8rem; }
        .tabs { display:flex; background:var(--card); border-bottom:1px solid var(--border); padding:0 2rem; overflow-x:auto; }
        .tab { padding:1rem 2rem; cursor:pointer; color:#a78bca; border-bottom:3px solid transparent; white-space:nowrap; }
        .tab.active { color:var(--main); border-bottom-color:var(--main); }
        .content { max-width:1000px; margin:2rem auto; padding:0 1rem; }
        .panel { display:none; } .panel.active { display:block; }
        .card { background:var(--card); border:1px solid var(--border); border-radius:1rem; padding:2rem; margin-bottom:1.5rem; }
        .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; margin-bottom:1rem; }
        label { display:block; color:var(--main); font-weight:600; margin:1rem 0 .5rem; }
        input, textarea { width:100%; background:#04000e; border:1px solid var(--border); color:#fff; padding:1rem; border-radius:.5rem; outline:none; }
        input:focus, textarea:focus { border-color:var(--main); }
        .badge { background:rgba(168,85,247,0.2); color:var(--main); padding:.2rem .5rem; border-radius:.3rem; font-size:.9rem; }
        .btn-save, .btn-add { background:var(--main); color:#fff; border:none; padding:1rem 2rem; border-radius:2rem; cursor:pointer; font-weight:600; width:100%; margin-top:1rem; transition:0.3s; }
        .btn-save:hover { background:#9333ea; }
        .btn-save:disabled { background:#4c1d95; cursor:wait; }
        .btn-add { background:transparent; border:2px dashed var(--main); color:var(--main); }
        .btn-add:hover { background:rgba(168,85,247,0.1); }
        .item-row { border:1px solid var(--border); padding:1.5rem; border-radius:.5rem; margin-bottom:1rem; position:relative; background:#07001a; }
        .btn-del { position:absolute; top:1rem; right:1rem; background:#f43f5e; color:#fff; border:none; padding:.5rem; border-radius:.3rem; cursor:pointer; }
        .toast { position:fixed; bottom:2rem; right:2rem; color:#fff; padding:1rem 2rem; border-radius:.5rem; display:none; font-weight:600; }
        .toast.success { background:#a855f7; }
        .toast.error   { background:#f43f5e; }

        /* Loading overlay */
        #loading-overlay { position:fixed; inset:0; background:rgba(4,0,14,0.85); z-index:8888; display:flex; align-items:center; justify-content:center; display:none; }
        .spinner { width:50px; height:50px; border:4px solid #4c1d95; border-top-color:#a855f7; border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }

        @media(max-width:600px) { .grid-2 { grid-template-columns:1fr; } .header { padding:1rem; } }
    </style>
</head>
<body>

<!-- Loading Overlay -->
<div id="loading-overlay"><div class="spinner"></div></div>

<!-- Login Screen -->
<div id="login-screen">
    <div class="login-box">
        <h2><i class="fa-solid fa-lock"></i> Dashboard Login</h2>
        <input type="text"     id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button class="btn-save" onclick="checkLogin()">Login</button>
        <p id="login-error">اسم المستخدم أو كلمة المرور غير صحيحة!</p>
    </div>
</div>

<!-- Dashboard Content -->
<div id="dashboard-content" style="display:none;">
    <div class="header">
        <h1><i class="fa-solid fa-gauge"></i> Portfolio Dashboard</h1>
        <a href="index.html" style="color:#fff;text-decoration:none;"><i class="fa-solid fa-arrow-left"></i> Back to Site</a>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('home',this)">Home</div>
        <div class="tab" onclick="switchTab('about',this)">About</div>
        <div class="tab" onclick="switchTab('skills',this)">Skills</div>
        <div class="tab" onclick="switchTab('projects',this)">Projects</div>
        <div class="tab" onclick="switchTab('edu',this)">Education</div>
        <div class="tab" onclick="switchTab('contact',this)">Contact</div>
    </div>

    <div class="content">

        <!-- Home -->
        <div class="panel active" id="panel-home">
            <div class="card">
                <h2>Home Section</h2>
                <div class="grid-2">
                    <div><span class="badge">EN</span><label>Description</label><textarea id="h_desc_en" rows="4"></textarea></div>
                    <div><span class="badge">AR</span><label>Description</label><textarea id="h_desc_ar" rows="4" dir="rtl"></textarea></div>
                </div>
            </div>
            <button class="btn-save" onclick="saveData(this)"><i class="fa-solid fa-save"></i> Save Changes</button>
        </div>

        <!-- About -->
        <div class="panel" id="panel-about">
            <div class="card">
                <h2>About Me</h2>
                <div class="grid-2">
                    <div><span class="badge">EN</span><label>Description</label><textarea id="a_desc_en" rows="4"></textarea></div>
                    <div><span class="badge">AR</span><label>Description</label><textarea id="a_desc_ar" rows="4" dir="rtl"></textarea></div>
                </div>
                <div class="grid-2">
                    <div><label>Name (EN)</label><input type="text" id="a_name_en"></div>
                    <div><label>Name (AR)</label><input type="text" id="a_name_ar" dir="rtl"></div>
                    <div><label>Title (EN)</label><input type="text" id="a_title_en"></div>
                    <div><label>Title (AR)</label><input type="text" id="a_title_ar" dir="rtl"></div>
                    <div><label>Location (EN)</label><input type="text" id="a_loc_en"></div>
                    <div><label>Location (AR)</label><input type="text" id="a_loc_ar" dir="rtl"></div>
                    <div><label>Email</label><input type="email" id="a_email"></div>
                </div>
            </div>
            <button class="btn-save" onclick="saveData(this)"><i class="fa-solid fa-save"></i> Save Changes</button>
        </div>

        <!-- Skills -->
        <div class="panel" id="panel-skills">
            <div class="card">
                <h2>Skills</h2>
                <div id="skills-container"></div>
                <button class="btn-add" onclick="addSkill()"><i class="fa-solid fa-plus"></i> Add Skill</button>
            </div>
            <button class="btn-save" onclick="saveData(this)"><i class="fa-solid fa-save"></i> Save Changes</button>
        </div>

        <!-- Projects -->
        <div class="panel" id="panel-projects">
            <div class="card">
                <h2>Latest Projects</h2>
                <div id="projects-container"></div>
                <button class="btn-add" onclick="addProject()"><i class="fa-solid fa-plus"></i> Add Project</button>
            </div>
            <button class="btn-save" onclick="saveData(this)"><i class="fa-solid fa-save"></i> Save Changes</button>
        </div>

        <!-- Education -->
        <div class="panel" id="panel-edu">
            <div class="card">
                <h2>Education</h2>
                <div class="grid-2">
                    <div><span class="badge">EN</span><label>Description</label><textarea id="e_desc_en" rows="4"></textarea></div>
                    <div><span class="badge">AR</span><label>Description</label><textarea id="e_desc_ar" rows="4" dir="rtl"></textarea></div>
                </div>
            </div>
            <button class="btn-save" onclick="saveData(this)"><i class="fa-solid fa-save"></i> Save Changes</button>
        </div>

        <!-- Contact -->
        <div class="panel" id="panel-contact">
            <div class="card">
                <h2>Contact Info</h2>
                <div class="grid-2">
                    <div><label>Email</label><input type="text" id="c_email"></div>
                    <div><label>Phone</label><input type="text" id="c_phone"></div>
                    <div><label>Location (EN)</label><input type="text" id="c_loc_en"></div>
                    <div><label>Location (AR)</label><input type="text" id="c_loc_ar" dir="rtl"></div>
                    <div><label>LinkedIn URL</label><input type="text" id="c_linkedin"></div>
                    <div></div>
                    <div><label>Current Coding (EN)</label><input type="text" id="c_coding_en" placeholder="e.g. React Native"></div>
                    <div><label>الترميز الحالي (AR)</label><input type="text" id="c_coding_ar" dir="rtl" placeholder="مثل: رياكت نيتف"></div>
                </div>
            </div>
            <button class="btn-save" onclick="saveData(this)"><i class="fa-solid fa-save"></i> Save Changes</button>
        </div>

    </div><!-- .content -->
</div><!-- #dashboard-content -->

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   إعدادات الـ API
   ============================================================ */
const API_URL = '/.netlify/functions/data';

/* يُخزّن كلمة المرور المدخلة في session (لإعادة استخدامها عند Save) */
let _sessionPass = '';

/* الـ db الحالي في الذاكرة */
let db = {
    home: { desc_en:"", desc_ar:"" },
    about: { desc_en:"", desc_ar:"", name_en:"", name_ar:"", title_en:"", title_ar:"", loc_en:"", loc_ar:"", email:"" },
    skills: [],
    projects: [],
    edu: { desc_en:"", desc_ar:"" },
    contact: { email:"", phone:"", loc_en:"", loc_ar:"", linkedin:"", coding_en:"", coding_ar:"" }
};

/* ============================================================
   Login
   ============================================================ */
function checkLogin() {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value.trim();

    // تحقق بسيط على جهة الكلاينت (اسم المستخدم فقط)
    if (user !== 'HK4') {
        document.getElementById('login-error').style.display = 'block';
        return;
    }

    // احفظ كلمة السر لاستخدامها في الـ POST
    _sessionPass = pass;
    sessionStorage.setItem('hk4_auth', 'true');

    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard-content').style.display = 'block';
    loadData();
}

window.onload = function() {
    if (sessionStorage.getItem('hk4_auth') === 'true') {
        // اطلب كلمة السر مجدداً إذا لم تكن محفوظة في الجلسة
        _sessionPass = sessionStorage.getItem('hk4_pass') || '';
        if (!_sessionPass) {
            // أظهر login screen لطلب كلمة السر
            document.getElementById('login-screen').style.display = 'flex';
            return;
        }
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard-content').style.display = 'block';
        loadData();
    }
};

/* ============================================================
   Tabs
   ============================================================ */
function switchTab(id, el) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('panel-' + id).classList.add('active');
    el.classList.add('active');
}

/* ============================================================
   Load Data من API
   ============================================================ */
async function loadData() {
    showLoading(true);
    try {
        const res  = await fetch(API_URL);
        const data = await res.json();

        // ادمج مع الـ default لضمان عدم وجود قيم undefined
        if (data.home)    db.home    = { ...db.home,    ...data.home };
        if (data.about)   db.about   = { ...db.about,   ...data.about };
        if (data.edu)     db.edu     = { ...db.edu,     ...data.edu };
        if (data.contact) db.contact = { ...db.contact, ...data.contact };
        if (Array.isArray(data.skills))   db.skills   = data.skills;
        if (Array.isArray(data.projects)) db.projects = data.projects;

        fillFields();
    } catch (e) {
        showToast('فشل جلب البيانات: ' + e.message, false);
    }
    showLoading(false);
}

function fillFields() {
    const fields = [
        'h_desc_en','h_desc_ar',
        'a_desc_en','a_desc_ar','a_name_en','a_name_ar','a_title_en','a_title_ar','a_loc_en','a_loc_ar','a_email',
        'e_desc_en','e_desc_ar',
        'c_email','c_phone','c_loc_en','c_loc_ar','c_linkedin','c_coding_en','c_coding_ar'
    ];
    fields.forEach(f => {
        const section = f[0] === 'h' ? 'home' : f[0] === 'a' ? 'about' : f[0] === 'e' ? 'edu' : 'contact';
        const key     = f.substring(2);
        const el      = document.getElementById(f);
        if (el) el.value = db[section][key] || '';
    });
    renderSkills();
    renderProjects();
}

/* ============================================================
   Save Data إلى API
   ============================================================ */
async function saveData(btn) {
    // اقرأ الحقول أولاً إلى db
    const fields = [
        'h_desc_en','h_desc_ar',
        'a_desc_en','a_desc_ar','a_name_en','a_name_ar','a_title_en','a_title_ar','a_loc_en','a_loc_ar','a_email',
        'e_desc_en','e_desc_ar',
        'c_email','c_phone','c_loc_en','c_loc_ar','c_linkedin','c_coding_en','c_coding_ar'
    ];
    fields.forEach(f => {
        const section = f[0] === 'h' ? 'home' : f[0] === 'a' ? 'about' : f[0] === 'e' ? 'edu' : 'contact';
        const key     = f.substring(2);
        const el      = document.getElementById(f);
        if (el) db[section][key] = el.value;
    });

    const origText = btn.innerHTML;
    btn.disabled   = true;
    btn.innerHTML  = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';

    try {
        const res = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password: _sessionPass, data: db })
        });

        const result = await res.json();

        if (res.ok && result.success) {
            showToast('Saved Successfully! ✓', true);
        } else if (res.status === 401) {
            showToast('كلمة المرور غير صحيحة — سجّل خروج ودخول مجدداً', false);
            sessionStorage.clear();
        } else {
            showToast('خطأ: ' + (result.error || 'Unknown'), false);
        }
    } catch (e) {
        showToast('فشل الحفظ: ' + e.message, false);
    }

    btn.disabled  = false;
    btn.innerHTML = origText;
}

/* ============================================================
   Skills CRUD
   ============================================================ */
function renderSkills() {
    document.getElementById('skills-container').innerHTML = db.skills.map((s, i) => `
        <div class="item-row">
            <button class="btn-del" onclick="delSkill(${i})"><i class="fa-solid fa-trash"></i></button>
            <div class="grid-2">
                <div><label>Name (EN)</label><input type="text" value="${(s.name_en||'').replace(/"/g,'&quot;')}" oninput="db.skills[${i}].name_en=this.value"></div>
                <div><label>Name (AR)</label><input type="text" value="${(s.name_ar||'').replace(/"/g,'&quot;')}" oninput="db.skills[${i}].name_ar=this.value" dir="rtl"></div>
                <div><label>Desc (EN)</label><textarea oninput="db.skills[${i}].desc_en=this.value">${s.desc_en||''}</textarea></div>
                <div><label>Desc (AR)</label><textarea oninput="db.skills[${i}].desc_ar=this.value" dir="rtl">${s.desc_ar||''}</textarea></div>
            </div>
            <label>Tags (Comma separated)</label>
            <input type="text" value="${(s.tags||'').replace(/"/g,'&quot;')}" oninput="db.skills[${i}].tags=this.value">
        </div>`).join('');
}
function addSkill()    { db.skills.push({name_en:'',name_ar:'',desc_en:'',desc_ar:'',tags:''}); renderSkills(); }
function delSkill(i)   { db.skills.splice(i,1); renderSkills(); }

/* ============================================================
   Projects CRUD
   ============================================================ */
function renderProjects() {
    document.getElementById('projects-container').innerHTML = db.projects.map((p, i) => `
        <div class="item-row">
            <button class="btn-del" onclick="delProj(${i})"><i class="fa-solid fa-trash"></i></button>
            <div class="grid-2">
                <div><label>Image URL</label><input type="text" value="${(p.img||'').replace(/"/g,'&quot;')}" oninput="db.projects[${i}].img=this.value"></div>
                <div><label>Project Link</label><input type="text" value="${(p.link||'').replace(/"/g,'&quot;')}" oninput="db.projects[${i}].link=this.value"></div>
                <div><label>Name (EN)</label><input type="text" value="${(p.name_en||'').replace(/"/g,'&quot;')}" oninput="db.projects[${i}].name_en=this.value"></div>
                <div><label>Name (AR)</label><input type="text" value="${(p.name_ar||'').replace(/"/g,'&quot;')}" oninput="db.projects[${i}].name_ar=this.value" dir="rtl"></div>
                <div><label>Short Desc (EN)</label><textarea oninput="db.projects[${i}].short_en=this.value">${p.short_en||''}</textarea></div>
                <div><label>Short Desc (AR)</label><textarea oninput="db.projects[${i}].short_ar=this.value" dir="rtl">${p.short_ar||''}</textarea></div>
                <div><label>Popup Details (EN)</label><textarea oninput="db.projects[${i}].full_en=this.value">${p.full_en||''}</textarea></div>
                <div><label>Popup Details (AR)</label><textarea oninput="db.projects[${i}].full_ar=this.value" dir="rtl">${p.full_ar||''}</textarea></div>
            </div>
            <label>Tags (Comma separated)</label>
            <input type="text" value="${(p.tags||'').replace(/"/g,'&quot;')}" oninput="db.projects[${i}].tags=this.value">
        </div>`).join('');
}
function addProject() { db.projects.push({img:'',link:'',name_en:'',name_ar:'',short_en:'',short_ar:'',full_en:'',full_ar:'',tags:''}); renderProjects(); }
function delProj(i)   { db.projects.splice(i,1); renderProjects(); }

/* ============================================================
   Helpers
   ============================================================ */
function showToast(msg, success) {
    const t = document.getElementById('toast');
    t.textContent  = msg;
    t.className    = 'toast ' + (success ? 'success' : 'error');
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
}

function showLoading(show) {
    document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
}

/* حفظ كلمة السر في الجلسة عند تسجيل الدخول */
const _origCheckLogin = checkLogin;
window.checkLogin = function() {
    sessionStorage.setItem('hk4_pass', document.getElementById('password').value.trim());
    _origCheckLogin();
};
</script>
</body>
</html>
